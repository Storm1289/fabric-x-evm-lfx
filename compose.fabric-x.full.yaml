    pull_policy: missing
    restart: unless-stopped
    user: "${UID:-1000}:${GID:-1000}"
    command: consensus --config=/config/node_config.yaml
    volumes:
      - ./testdata/config/party3-consenter.yaml:/config/node_config.yaml:ro,Z
      - ./testdata/crypto/ordererOrganizations/orderer-org-3/orderers/party3/consenter.orderer-org-3/tls:/node-tls:ro,Z
      - ./testdata/crypto/ordererOrganizations/orderer-org-3/orderers/party3/consenter.orderer-org-3/msp:/node-msp:ro,Z
      - ./testdata/crypto/ordererOrganizations/orderer-org-3/msp/tlscacerts/tlsca.orderer-org-3-cert.pem:/org-tls-ca.pem:ro,Z
      - ./testdata/crypto/config-block.pb.bin:/bootstrap/genesis.block:ro,Z
      - ./data/orderers/party3-consenter:/data:Z
    networks:
      - fabric-x

  orderer-party3-assembler:
    image: ghcr.io/hyperledger/fabric-x-orderer:1.0.0
    pull_policy: missing
    restart: unless-stopped
    user: "${UID:-1000}:${GID:-1000}"
    command: assembler --config=/config/node_config.yaml
    ports:
      - "7253:7253"
    volumes:
      - ./testdata/config/party3-assembler.yaml:/config/node_config.yaml:ro,Z
      - ./testdata/crypto/ordererOrganizations/orderer-org-3/orderers/party3/assembler.orderer-org-3/tls:/node-tls:ro,Z
      - ./testdata/crypto/ordererOrganizations/orderer-org-3/orderers/party3/assembler.orderer-org-3/msp:/node-msp:ro,Z
      - ./testdata/crypto/ordererOrganizations/orderer-org-3/msp/tlscacerts/tlsca.orderer-org-3-cert.pem:/org-tls-ca.pem:ro,Z
      - ./testdata/crypto/client-tls-ca.pem:/client-tls-ca.pem:ro,Z
      - ./testdata/crypto/config-block.pb.bin:/bootstrap/genesis.block:ro,Z
      - ./data/orderers/party3-assembler:/data:Z
