name: fabric-x

# Fabric-X: 4-party Arma orderer (16 containers) + Org1 committer stack (6 containers).
# Run `make init` first to generate crypto material and the genesis block.
# Start: make start
# Add Org2: docker compose -f compose.yaml -f compose.org2.yaml up -d

networks:
  fabric-x:
    name: fabric-x
    driver: bridge

services:
  # ─── Orderer Party 1 ───────────────────────────────────────────────────────

  orderer-party1-router:
    image: ghcr.io/hyperledger/fabric-x-orderer:1.0.0
    pull_policy: missing
    restart: unless-stopped
    user: "${UID:-1000}:${GID:-1000}"
    command: router --config=/config/node_config.yaml
    ports:
      - "7050:7050"
    volumes:
      - ./testdata/config/party1-router.yaml:/config/node_config.yaml:ro,Z
      - ./testdata/crypto/ordererOrganizations/orderer-org-1/orderers/party1/router.orderer-org-1/tls:/node-tls:ro,Z
      - ./testdata/crypto/ordererOrganizations/orderer-org-1/orderers/party1/router.orderer-org-1/msp:/node-msp:ro,Z
      - ./testdata/crypto/ordererOrganizations/orderer-org-1/msp/tlscacerts/tlsca.orderer-org-1-cert.pem:/org-tls-ca.pem:ro,Z
      - ./testdata/crypto/client-tls-ca.pem:/client-tls-ca.pem:ro,Z
      - ./testdata/crypto/config-block.pb.bin:/bootstrap/genesis.block:ro,Z
      - ./data/orderers/party1-router:/data:Z
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9443/metrics"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    networks:
      - fabric-x

  orderer-party1-batcher:
    image: ghcr.io/hyperledger/fabric-x-orderer:1.0.0
    pull_policy: missing
    restart: unless-stopped
    user: "${UID:-1000}:${GID:-1000}"
    command: batcher --config=/config/node_config.yaml
    volumes:
      - ./testdata/config/party1-batcher.yaml:/config/node_config.yaml:ro,Z
      - ./testdata/crypto/ordererOrganizations/orderer-org-1/orderers/party1/batcher1.orderer-org-1/tls:/node-tls:ro,Z
      - ./testdata/crypto/ordererOrganizations/orderer-org-1/orderers/party1/batcher1.orderer-org-1/msp:/node-msp:ro,Z
      - ./testdata/crypto/ordererOrganizations/orderer-org-1/msp/tlscacerts/tlsca.orderer-org-1-cert.pem:/org-tls-ca.pem:ro,Z
      - ./testdata/crypto/config-block.pb.bin:/bootstrap/genesis.block:ro,Z
      - ./data/orderers/party1-batcher:/data:Z
    networks:
      - fabric-x

  orderer-party1-consenter:
    image: ghcr.io/hyperledger/fabric-x-orderer:1.0.0
    pull_policy: missing
    restart: unless-stopped
    user: "${UID:-1000}:${GID:-1000}"
    command: consensus --config=/config/node_config.yaml
    volumes:
      - ./testdata/config/party1-consenter.yaml:/config/node_config.yaml:ro,Z
      - ./testdata/crypto/ordererOrganizations/orderer-org-1/orderers/party1/consenter.orderer-org-1/tls:/node-tls:ro,Z
      - ./testdata/crypto/ordererOrganizations/orderer-org-1/orderers/party1/consenter.orderer-org-1/msp:/node-msp:ro,Z
      - ./testdata/crypto/ordererOrganizations/orderer-org-1/msp/tlscacerts/tlsca.orderer-org-1-cert.pem:/org-tls-ca.pem:ro,Z
      - ./testdata/crypto/config-block.pb.bin:/bootstrap/genesis.block:ro,Z
      - ./data/orderers/party1-consenter:/data:Z
    networks:
      - fabric-x

  orderer-party1-assembler:
    image: ghcr.io/hyperledger/fabric-x-orderer:1.0.0
    pull_policy: missing
    restart: unless-stopped
    user: "${UID:-1000}:${GID:-1000}"
    command: assembler --config=/config/node_config.yaml
    ports:
      - "7053:7053"
    volumes:
      - ./testdata/config/party1-assembler.yaml:/config/node_config.yaml:ro,Z
      - ./testdata/crypto/ordererOrganizations/orderer-org-1/orderers/party1/assembler.orderer-org-1/tls:/node-tls:ro,Z
      - ./testdata/crypto/ordererOrganizations/orderer-org-1/orderers/party1/assembler.orderer-org-1/msp:/node-msp:ro,Z
      - ./testdata/crypto/ordererOrganizations/orderer-org-1/msp/tlscacerts/tlsca.orderer-org-1-cert.pem:/org-tls-ca.pem:ro,Z
      - ./testdata/crypto/client-tls-ca.pem:/client-tls-ca.pem:ro,Z
      - ./testdata/crypto/config-block.pb.bin:/bootstrap/genesis.block:ro,Z
      - ./data/orderers/party1-assembler:/data:Z
