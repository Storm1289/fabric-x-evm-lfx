      - ./testdata/crypto/ordererOrganizations/orderer-org-2/orderers/party2/assembler.orderer-org-2/tls:/node-tls:ro,Z
      - ./testdata/crypto/ordererOrganizations/orderer-org-2/orderers/party2/assembler.orderer-org-2/msp:/node-msp:ro,Z
      - ./testdata/crypto/ordererOrganizations/orderer-org-2/msp/tlscacerts/tlsca.orderer-org-2-cert.pem:/org-tls-ca.pem:ro,Z
      - ./testdata/crypto/client-tls-ca.pem:/client-tls-ca.pem:ro,Z
      - ./testdata/crypto/config-block.pb.bin:/bootstrap/genesis.block:ro,Z
      - ./data/orderers/party2-assembler:/data:Z
    networks:
      - fabric-x

  # ─── Orderer Party 3 ───────────────────────────────────────────────────────

  orderer-party3-router:
    image: ghcr.io/hyperledger/fabric-x-orderer:1.0.0
    pull_policy: missing
    restart: unless-stopped
    user: "${UID:-1000}:${GID:-1000}"
    command: router --config=/config/node_config.yaml
    ports:
      - "7250:7250"
    volumes:
      - ./testdata/config/party3-router.yaml:/config/node_config.yaml:ro,Z
      - ./testdata/crypto/ordererOrganizations/orderer-org-3/orderers/party3/router.orderer-org-3/tls:/node-tls:ro,Z
      - ./testdata/crypto/ordererOrganizations/orderer-org-3/orderers/party3/router.orderer-org-3/msp:/node-msp:ro,Z
      - ./testdata/crypto/ordererOrganizations/orderer-org-3/msp/tlscacerts/tlsca.orderer-org-3-cert.pem:/org-tls-ca.pem:ro,Z
