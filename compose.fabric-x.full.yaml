    image: ghcr.io/hyperledger/fabric-x-orderer:1.0.0
    pull_policy: missing
    restart: unless-stopped
    user: "${UID:-1000}:${GID:-1000}"
    command: batcher --config=/config/node_config.yaml
    volumes:
      - ./testdata/config/party4-batcher.yaml:/config/node_config.yaml:ro,Z
      - ./testdata/crypto/ordererOrganizations/orderer-org-4/orderers/party4/batcher1.orderer-org-4/tls:/node-tls:ro,Z
      - ./testdata/crypto/ordererOrganizations/orderer-org-4/orderers/party4/batcher1.orderer-org-4/msp:/node-msp:ro,Z
      - ./testdata/crypto/ordererOrganizations/orderer-org-4/msp/tlscacerts/tlsca.orderer-org-4-cert.pem:/org-tls-ca.pem:ro,Z
      - ./testdata/crypto/config-block.pb.bin:/bootstrap/genesis.block:ro,Z
      - ./data/orderers/party4-batcher:/data:Z
    networks:
      - fabric-x

  orderer-party4-consenter:
    image: ghcr.io/hyperledger/fabric-x-orderer:1.0.0
    pull_policy: missing
    restart: unless-stopped
    user: "${UID:-1000}:${GID:-1000}"
    command: consensus --config=/config/node_config.yaml
    volumes:
      - ./testdata/config/party4-consenter.yaml:/config/node_config.yaml:ro,Z
      - ./testdata/crypto/ordererOrganizations/orderer-org-4/orderers/party4/consenter.orderer-org-4/tls:/node-tls:ro,Z
      - ./testdata/crypto/ordererOrganizations/orderer-org-4/orderers/party4/consenter.orderer-org-4/msp:/node-msp:ro,Z
      - ./testdata/crypto/ordererOrganizations/orderer-org-4/msp/tlscacerts/tlsca.orderer-org-4-cert.pem:/org-tls-ca.pem:ro,Z
      - ./testdata/crypto/config-block.pb.bin:/bootstrap/genesis.block:ro,Z
      - ./data/orderers/party4-consenter:/data:Z
    networks:
      - fabric-x

  orderer-party4-assembler:
    image: ghcr.io/hyperledger/fabric-x-orderer:1.0.0
    pull_policy: missing
    restart: unless-stopped
    user: "${UID:-1000}:${GID:-1000}"
    command: assembler --config=/config/node_config.yaml
    ports:
      - "7353:7353"
    volumes:
      - ./testdata/config/party4-assembler.yaml:/config/node_config.yaml:ro,Z
      - ./testdata/crypto/ordererOrganizations/orderer-org-4/orderers/party4/assembler.orderer-org-4/tls:/node-tls:ro,Z
      - ./testdata/crypto/ordererOrganizations/orderer-org-4/orderers/party4/assembler.orderer-org-4/msp:/node-msp:ro,Z
      - ./testdata/crypto/ordererOrganizations/orderer-org-4/msp/tlscacerts/tlsca.orderer-org-4-cert.pem:/org-tls-ca.pem:ro,Z
      - ./testdata/crypto/client-tls-ca.pem:/client-tls-ca.pem:ro,Z
      - ./testdata/crypto/config-block.pb.bin:/bootstrap/genesis.block:ro,Z
      - ./data/orderers/party4-assembler:/data:Z
    networks:
      - fabric-x

  # ─── Org1 committer stack ───────────────────────────────────────────────────

  committer-db:
    image: docker.io/library/postgres:18.3-alpine3.23
    pull_policy: missing
    restart: unless-stopped
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      POSTGRES_DB: sc_db
      POSTGRES_USER: sc_user
      POSTGRES_PASSWORD: sc_secret_pwd
      PGDATA: /var/lib/postgresql/data
    volumes:
      - ./data/committer-org1/db:/var/lib/postgresql/data:Z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sc_user -d sc_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - fabric-x

  committer-verifier:
    image: ghcr.io/hyperledger/fabric-x-committer:1.0.3
    pull_policy: missing
    restart: unless-stopped
    user: "${UID:-1000}:${GID:-1000}"
    command: start verifier --config=/config/verifier.yaml
    volumes:
      - ./testdata/config/committer-verifier.yaml:/config/verifier.yaml:ro,Z
      - ./testdata/crypto/peerOrganizations/org1.example.com/peers/committer-verifier.org1.example.com/tls:/node-tls:ro,Z
      - ./testdata/crypto/peerOrganizations/org1.example.com/msp/tlscacerts/tlsca.org1.example.com-cert.pem:/org-tls-ca.pem:ro,Z
    networks:
      - fabric-x

  committer-validator:
    image: ghcr.io/hyperledger/fabric-x-committer:1.0.3
    pull_policy: missing
    restart: unless-stopped
    user: "${UID:-1000}:${GID:-1000}"
    command: start vc --config=/config/validator.yaml
    volumes:
      - ./testdata/config/committer-validator.yaml:/config/validator.yaml:ro,Z
      - ./testdata/crypto/peerOrganizations/org1.example.com/peers/committer-validator.org1.example.com/tls:/node-tls:ro,Z
      - ./testdata/crypto/peerOrganizations/org1.example.com/msp/tlscacerts/tlsca.org1.example.com-cert.pem:/org-tls-ca.pem:ro,Z
    environment:
      SC_VC_DATABASE_ENDPOINTS: committer-db:5432
    depends_on:
      committer-db:
        condition: service_healthy
    networks:
      - fabric-x

  committer-coordinator:
    image: ghcr.io/hyperledger/fabric-x-committer:1.0.3
    pull_policy: missing
    restart: unless-stopped
    user: "${UID:-1000}:${GID:-1000}"
    command: start coordinator --config=/config/coordinator.yaml
    volumes:
      - ./testdata/config/committer-coordinator.yaml:/config/coordinator.yaml:ro,Z
      - ./testdata/crypto/peerOrganizations/org1.example.com/peers/committer-coordinator.org1.example.com/tls:/node-tls:ro,Z
      - ./testdata/crypto/peerOrganizations/org1.example.com/msp/tlscacerts/tlsca.org1.example.com-cert.pem:/org-tls-ca.pem:ro,Z
    environment:
      SC_COORDINATOR_VERIFIER_ENDPOINTS: committer-verifier:5001
      SC_COORDINATOR_VALIDATOR_COMMITTER_ENDPOINTS: committer-validator:6001
    depends_on:
      - committer-verifier
      - committer-validator
    networks:
      - fabric-x

  committer-sidecar:
    image: ghcr.io/hyperledger/fabric-x-committer:1.0.3
    pull_policy: missing
    restart: unless-stopped
    user: "${UID:-1000}:${GID:-1000}"
    command: start sidecar --config=/config/sidecar.yaml
    ports:
      - "4001:4001"
    volumes:
      - ./testdata/config/committer-sidecar.yaml:/config/sidecar.yaml:ro,Z
      - ./testdata/crypto/peerOrganizations/org1.example.com/peers/committer-sidecar.org1.example.com/tls:/node-tls:ro,Z
      - ./testdata/crypto/peerOrganizations/org1.example.com/msp/tlscacerts/tlsca.org1.example.com-cert.pem:/org-tls-ca.pem:ro,Z
      - ./testdata/crypto/peerOrganizations/org1.example.com/users/User1@org1.example.com/msp:/msp:ro,Z
      - ./testdata/crypto/ordererOrganizations:/orderer-cas:ro,Z
      - ./testdata/crypto/config-block.pb.bin:/bootstrap/genesis.block:ro,Z
      - ./data/committer-org1/sidecar-ledger:/ledger:Z
    depends_on:
      committer-coordinator:
        condition: service_started
      orderer-party1-router:
        condition: service_healthy
    networks:
      - fabric-x

  committer-query-service:
    image: ghcr.io/hyperledger/fabric-x-committer:1.0.3
    pull_policy: missing
    restart: unless-stopped
    user: "${UID:-1000}:${GID:-1000}"
    command: start query --config=/config/query-service.yaml
    ports:
      - "7001:7001"
    volumes:
      - ./testdata/config/committer-query-service.yaml:/config/query-service.yaml:ro,Z
      - ./testdata/crypto/peerOrganizations/org1.example.com/peers/committer-query-service.org1.example.com/tls:/node-tls:ro,Z
      - ./testdata/crypto/peerOrganizations/org1.example.com/msp/tlscacerts/tlsca.org1.example.com-cert.pem:/org-tls-ca.pem:ro,Z
    environment:
      SC_QUERY_DATABASE_ENDPOINTS: committer-db:5432
    depends_on:
      committer-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:2117/metrics"]
      interval: 2s
      timeout: 3s
      retries: 30
      start_period: 10s
    networks:
      - fabric-x

  # ─── Monitoring Stack ───────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v3.3.1
    pull_policy: missing
    restart: unless-stopped
    container_name: prometheus
    volumes:
      - ./testdata/config/prometheus.yml:/etc/prometheus/prometheus.yml:ro,Z
      - ./testdata/crypto:/tls:ro,Z
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=1h"
      - "--web.enable-remote-write-receiver"
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - fabric-x

  grafana:
    image: grafana/grafana:11.6.0
    pull_policy: missing
    restart: unless-stopped
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/committer.json
    volumes:
      - ./testdata/config/grafana/grafana-datasource.yml:/etc/grafana/provisioning/datasources/prometheus.yml:ro,Z
      - ./testdata/config/grafana/grafana-dashboards.yml:/etc/grafana/provisioning/dashboards/dashboard.yml:ro,Z
      - ./testdata/config/grafana/committer.json:/var/lib/grafana/dashboards/committer.json:ro,Z
      - ./testdata/config/grafana/orderer.json:/var/lib/grafana/dashboards/orderer.json:ro,Z
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - fabric-x
