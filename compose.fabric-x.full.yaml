  # ─── Orderer Party 4 ───────────────────────────────────────────────────────

  orderer-party4-router:
    image: ghcr.io/hyperledger/fabric-x-orderer:1.0.0
    pull_policy: missing
    restart: unless-stopped
    user: "${UID:-1000}:${GID:-1000}"
    command: router --config=/config/node_config.yaml
    ports:
      - "7350:7350"
    volumes:
      - ./testdata/config/party4-router.yaml:/config/node_config.yaml:ro,Z
      - ./testdata/crypto/ordererOrganizations/orderer-org-4/orderers/party4/router.orderer-org-4/tls:/node-tls:ro,Z
      - ./testdata/crypto/ordererOrganizations/orderer-org-4/orderers/party4/router.orderer-org-4/msp:/node-msp:ro,Z
      - ./testdata/crypto/ordererOrganizations/orderer-org-4/msp/tlscacerts/tlsca.orderer-org-4-cert.pem:/org-tls-ca.pem:ro,Z
      - ./testdata/crypto/client-tls-ca.pem:/client-tls-ca.pem:ro,Z
