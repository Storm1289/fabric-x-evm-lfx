      - ./testdata/crypto/ordererOrganizations/orderer-org-3/orderers/party3/batcher1.orderer-org-3/tls:/node-tls:ro,Z
      - ./testdata/crypto/ordererOrganizations/orderer-org-3/orderers/party3/batcher1.orderer-org-3/msp:/node-msp:ro,Z
      - ./testdata/crypto/ordererOrganizations/orderer-org-3/msp/tlscacerts/tlsca.orderer-org-3-cert.pem:/org-tls-ca.pem:ro,Z
      - ./testdata/crypto/config-block.pb.bin:/bootstrap/genesis.block:ro,Z
