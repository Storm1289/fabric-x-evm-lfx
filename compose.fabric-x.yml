name: fabric-x

# Single-container Fabric-X dev setup: built-in orderer, committer, and database.
# Run `make init-x` first to generate crypto and the genesis block, then
# `make start-x`, which brings this up and creates the application namespace.

networks:
  fabric-x:
    name: fabric-x
    driver: bridge

services:
  test-committer:
    image: docker.io/hyperledger/fabric-x-committer-test-node:1.0.3
    pull_policy: missing
    restart: unless-stopped
    container_name: test-committer
    command: run db orderer committer
    ports:
      - "4001:4001"
      - "7001:7001"
      - "7050:7050"
      - "7053:7053"
    volumes:
      # Genesis block — read by mock orderer (genesis-block-path) and sidecar (latest-known-config-block-path)
      - ./testdata/crypto/config-block.pb.bin:/root/artifacts/config-block.pb.bin:ro,Z
      # Mock orderer signing identities — one consenter key per orderer org (all 4 required by BlockValidation policy)
      - ./testdata/crypto/ordererOrganizations/orderer-org-1/orderers/party1/consenter.orderer-org-1/msp:/orderer-consenter-msp-1:ro,Z
      - ./testdata/crypto/ordererOrganizations/orderer-org-2/orderers/party2/consenter.orderer-org-2/msp:/orderer-consenter-msp-2:ro,Z
      - ./testdata/crypto/ordererOrganizations/orderer-org-3/orderers/party3/consenter.orderer-org-3/msp:/orderer-consenter-msp-3:ro,Z
      - ./testdata/crypto/ordererOrganizations/orderer-org-4/orderers/party4/consenter.orderer-org-4/msp:/orderer-consenter-msp-4:ro,Z
      # Mock orderer TLS: party1 router cert (port 7050) and assembler cert (port 7053)
      - ./testdata/crypto/ordererOrganizations/orderer-org-1/orderers/party1/router.orderer-org-1/tls:/orderer-router-tls:ro,Z
      - ./testdata/crypto/ordererOrganizations/orderer-org-1/orderers/party1/assembler.orderer-org-1/tls:/orderer-assembler-tls:ro,Z
      - ./testdata/crypto/ordererOrganizations/orderer-org-1/msp/tlscacerts/tlsca.orderer-org-1-cert.pem:/orderer-org1-tls-ca.pem:ro,Z
      # Peer TLS identity — committer-test cert has SANs for all Docker aliases below
      - ./testdata/crypto/peerOrganizations/org1.example.com/peers/committer-test.org1.example.com/tls:/node-tls:ro,Z
      - ./testdata/crypto/peerOrganizations/org1.example.com/msp/tlscacerts/tlsca.org1.example.com-cert.pem:/org-tls-ca.pem:ro,Z
      # Sidecar MSP identity
      - ./testdata/crypto/peerOrganizations/org1.example.com/users/channel_admin@org1.example.com/msp:/msp:ro,Z
      # Override config files (image defaults use built-in crypto at /root/artifacts/)
      - ./testdata/config/mock-orderer.yaml:/root/config/mock-orderer.yaml:ro,Z
      - ./testdata/config/committer-sidecar-dev.yaml:/root/config/sidecar.yaml:ro,Z
      - ./testdata/config/committer-coordinator.yaml:/root/config/coordinator.yaml:ro,Z
      - ./testdata/config/committer-verifier.yaml:/root/config/verifier.yaml:ro,Z
      - ./testdata/config/committer-validator.yaml:/root/config/vc.yaml:ro,Z
      - ./testdata/config/committer-query-service.yaml:/root/config/query.yaml:ro,Z
    environment:
      # Internal endpoints — all services run in the same container
      SC_SIDECAR_COMMITTER_ENDPOINT: "localhost:9001"
      SC_COORDINATOR_VERIFIER_ENDPOINTS: "localhost:5001"
      SC_COORDINATOR_VALIDATOR_COMMITTER_ENDPOINTS: "localhost:6001"
      # Database credentials and endpoint for vc and query
      SC_VC_DATABASE_ENDPOINTS: "localhost:5433"
      SC_VC_DATABASE_USERNAME: "postgres"
      SC_VC_DATABASE_PASSWORD: "postgres"
      SC_VC_DATABASE_DATABASE: "postgres"
      SC_QUERY_DATABASE_ENDPOINTS: "localhost:5433"
      SC_QUERY_DATABASE_USERNAME: "postgres"
      SC_QUERY_DATABASE_PASSWORD: "postgres"
      SC_QUERY_DATABASE_DATABASE: "postgres"
      SC_ORDERER_BLOCK_SIZE: "1"
      # SC_ORDERER_BLOCK_TIMEOUT: "100ms"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 7001"]
      interval: 2s
      timeout: 3s
      retries: 30
      start_period: 10s
    networks:
      fabric-x:
        aliases:
          - committer-sidecar # sidecar notifications endpoint (TLS SAN on committer-test cert)
          - committer-query-service # query service endpoint
          - orderer-party1-router # mock orderer broadcast (port 7050)
          - orderer-party1-assembler # mock orderer deliver (port 7053)
