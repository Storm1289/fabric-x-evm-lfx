# Test configuration for integration tests against a Fabric-X test network.
# Paths are relative to the integration/ package directory (where go test runs).

network:
  protocol: fabric-x
  channel: mychannel
  namespace: basic
  ns-version: "1.0"
  chain-id: 4011

logging:
  spec: info

gateway:
  listen: "0.0.0.0:8545"

  identity:
    msp-id: Org1MSP
    msp-dir: ../testdata/crypto/peerOrganizations/org1.example.com/users/User1@org1.example.com/msp

  database:
    connection-string: "file:gateway.db?mode=memory&cache=shared"
    # trie-path: "" # trie db is temporarily disabled

  orderers:
    - endpoint:
        host: 127.0.0.1
        port: 7050
      tls:
        mode: mtls
        cert-path: ../testdata/crypto/peerOrganizations/org1.example.com/users/User1@org1.example.com/tls/client.crt
        key-path: ../testdata/crypto/peerOrganizations/org1.example.com/users/User1@org1.example.com/tls/client.key
        ca-cert-paths:
          - ../testdata/crypto/ordererOrganizations/orderer-org-1/tlsca/tlsca.orderer-org-1-cert.pem
    - endpoint:
        host: 127.0.0.1
        port: 7150
      tls:
        mode: mtls
        cert-path: ../testdata/crypto/peerOrganizations/org1.example.com/users/User1@org1.example.com/tls/client.crt
        key-path: ../testdata/crypto/peerOrganizations/org1.example.com/users/User1@org1.example.com/tls/client.key
        ca-cert-paths:
          - ../testdata/crypto/ordererOrganizations/orderer-org-2/tlsca/tlsca.orderer-org-2-cert.pem
    - endpoint:
        host: 127.0.0.1
        port: 7250
      tls:
        mode: mtls
        cert-path: ../testdata/crypto/peerOrganizations/org1.example.com/users/User1@org1.example.com/tls/client.crt
        key-path: ../testdata/crypto/peerOrganizations/org1.example.com/users/User1@org1.example.com/tls/client.key
        ca-cert-paths:
          - ../testdata/crypto/ordererOrganizations/orderer-org-3/tlsca/tlsca.orderer-org-3-cert.pem
    - endpoint:
        host: 127.0.0.1
        port: 7350
      tls:
        mode: mtls
        cert-path: ../testdata/crypto/peerOrganizations/org1.example.com/users/User1@org1.example.com/tls/client.crt
        key-path: ../testdata/crypto/peerOrganizations/org1.example.com/users/User1@org1.example.com/tls/client.key
        ca-cert-paths:
          - ../testdata/crypto/ordererOrganizations/orderer-org-4/tlsca/tlsca.orderer-org-4-cert.pem

  committer:
    endpoint:
      host: 127.0.0.1
      port: 4001
    tls:
      mode: mtls
      cert-path: ../testdata/crypto/peerOrganizations/org1.example.com/users/User1@org1.example.com/tls/client.crt
      key-path: ../testdata/crypto/peerOrganizations/org1.example.com/users/User1@org1.example.com/tls/client.key
      ca-cert-paths:
        - ../testdata/crypto/peerOrganizations/org1.example.com/tlsca/tlsca.org1.example.com-cert.pem

endorsers:
  - name: org1
    identity:
      msp-id: Org1MSP
      msp-dir: ../testdata/crypto/peerOrganizations/org1.example.com/peers/endorser.org1.example.com/msp
    committer:
      endpoint:
        host: 127.0.0.1
        port: 4001
      tls:
        mode: mtls
        cert-path: ../testdata/crypto/peerOrganizations/org1.example.com/users/User1@org1.example.com/tls/client.crt
        key-path: ../testdata/crypto/peerOrganizations/org1.example.com/users/User1@org1.example.com/tls/client.key
        ca-cert-paths:
          - ../testdata/crypto/peerOrganizations/org1.example.com/tlsca/tlsca.org1.example.com-cert.pem
    database:
      database: memory
      # connection-string: "file:endorser-org1.db?mode=memory&cache=shared"
