# Test configuration for Hardhat tests against a Fablo-managed Fabric test network.
# This config uses ONLY Org1 (single endorser) to match the hardhat-specific Fablo topology.
# Paths are relative to the integration/ package directory (where go test runs).

network:
  protocol: fabric
  channel: mychannel
  namespace: basic
  ns-version: "1.0"
  chain-id: 4011

logging:
  spec: info

gateway:
  listen: "0.0.0.0:8545"

  identity:
    msp-id: Org1MSP
    msp-dir: ../testdata/fablo/fablo-target/fabric-config/crypto-config/peerOrganizations/org1.example.com/users/User1@org1.example.com/msp

  database:
    connection-string: "file:gateway.db?mode=memory&cache=shared"
    # trie-path: "" # trie db is temporarily disabled

  orderers:
    - endpoint:
        host: 127.0.0.1
        port: 7030
      tls:
        mode: tls
        server-name: orderer0.group1.orderer.example.com
        ca-cert-paths:
          - ../testdata/fablo/fablo-target/fabric-config/crypto-config/peerOrganizations/orderer.example.com/tlsca/tlsca.orderer.example.com-cert.pem

  committer:
    endpoint:
      host: 127.0.0.1
      port: 7041
    tls:
      mode: tls
      server-name: peer0.org1.example.com
      ca-cert-paths:
        - ../testdata/fablo/fablo-target/fabric-config/crypto-config/peerOrganizations/org1.example.com/peers/peer0.org1.example.com/tls/ca.crt

endorsers:
  - name: org1
    identity:
      msp-id: Org1MSP
      msp-dir: ../testdata/fablo/fablo-target/fabric-config/crypto-config/peerOrganizations/org1.example.com/peers/peer0.org1.example.com/msp
    committer:
      endpoint:
        host: 127.0.0.1
        port: 7041
      tls:
        mode: tls
        server-name: peer0.org1.example.com
        ca-cert-paths:
          - ../testdata/fablo/fablo-target/fabric-config/crypto-config/peerOrganizations/org1.example.com/peers/peer0.org1.example.com/tls/ca.crt
    database:
      database: memory
