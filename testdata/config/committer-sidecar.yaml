# Sidecar config for compose.fabric-x.full.yaml (4-party Arma orderer).
---
server:
  endpoint: :4001
  tls: &tlsConfig
    mode: mtls
    cert-path: /node-tls/server.crt
    key-path: /node-tls/server.key
    ca-cert-paths:
      - /org-tls-ca.pem
monitoring:
  endpoint: :2114
  tls: *tlsConfig

orderer:
  fault-tolerance-level: CFT
  latest-known-config-block-path: /bootstrap/genesis.block
  tls:
    mode: mtls
    cert-path: /node-tls/server.crt
    key-path: /node-tls/server.key
    common-ca-cert-paths:
      - /orderer-cas/orderer-org-1/msp/tlscacerts/tlsca.orderer-org-1-cert.pem
      - /orderer-cas/orderer-org-2/msp/tlscacerts/tlsca.orderer-org-2-cert.pem
      - /orderer-cas/orderer-org-3/msp/tlscacerts/tlsca.orderer-org-3-cert.pem
      - /orderer-cas/orderer-org-4/msp/tlscacerts/tlsca.orderer-org-4-cert.pem
  identity:
    msp-id: Org1MSP
    msp-dir: /msp
    bccsp:
      Default: SW
      SW:
        Security: 256
        Hash: SHA2

committer:
  endpoint: committer-coordinator:9001
  tls: *tlsConfig

ledger:
  path: /ledger
  sync-interval: 100

notification:
  max-timeout: 10m
  max-active-tx-ids: 100_000
  max-tx-ids-per-request: 1000

last-committed-block-set-interval: 5s
waiting-txs-limit: 20_000_000
channel-buffer-size: 100

logging:
  logSpec: "info"
