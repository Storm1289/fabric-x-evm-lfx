---
Organizations:
  - &OrdererOrg1MSP
    Name: orderer-org-1
    SkipAsForeign: false
    ID: OrdererOrg1MSP
    MSPDir: ./crypto/ordererOrganizations/orderer-org-1/msp
    Policies:
      Readers:
        Type: Signature
        Rule: OR('OrdererOrg1MSP.member')
      Writers:
        Type: Signature
        Rule: OR('OrdererOrg1MSP.member')
      Admins:
        Type: Signature
        Rule: OR('OrdererOrg1MSP.admin')
    OrdererEndpoints:
      - id=0,broadcast,orderer-party1-router:7050
      - id=0,deliver,orderer-party1-assembler:7053

  - &OrdererOrg2MSP
    Name: orderer-org-2
    SkipAsForeign: false
    ID: OrdererOrg2MSP
    MSPDir: ./crypto/ordererOrganizations/orderer-org-2/msp
    Policies:
      Readers:
        Type: Signature
        Rule: OR('OrdererOrg2MSP.member')
      Writers:
        Type: Signature
        Rule: OR('OrdererOrg2MSP.member')
      Admins:
        Type: Signature
        Rule: OR('OrdererOrg2MSP.admin')
    OrdererEndpoints:
      - id=1,broadcast,orderer-party2-router:7150
      - id=1,deliver,orderer-party2-assembler:7153

  - &OrdererOrg3MSP
    Name: orderer-org-3
    SkipAsForeign: false
    ID: OrdererOrg3MSP
    MSPDir: ./crypto/ordererOrganizations/orderer-org-3/msp
    Policies:
      Readers:
        Type: Signature
        Rule: OR('OrdererOrg3MSP.member')
      Writers:
        Type: Signature
        Rule: OR('OrdererOrg3MSP.member')
      Admins:
        Type: Signature
        Rule: OR('OrdererOrg3MSP.admin')
    OrdererEndpoints:
      - id=2,broadcast,orderer-party3-router:7250
      - id=2,deliver,orderer-party3-assembler:7253

  - &OrdererOrg4MSP
    Name: orderer-org-4
    SkipAsForeign: false
    ID: OrdererOrg4MSP
    MSPDir: ./crypto/ordererOrganizations/orderer-org-4/msp
    Policies:
      Readers:
        Type: Signature
        Rule: OR('OrdererOrg4MSP.member')
      Writers:
        Type: Signature
        Rule: OR('OrdererOrg4MSP.member')
      Admins:
        Type: Signature
        Rule: OR('OrdererOrg4MSP.admin')
    OrdererEndpoints:
      - id=3,broadcast,orderer-party4-router:7350
      - id=3,deliver,orderer-party4-assembler:7353

  - &Org1MSP
    Name: Org1
    ID: Org1MSP
    MSPDir: ./crypto/peerOrganizations/org1.example.com/msp
    Policies:
      Readers:
        Type: Signature
        Rule: OR('Org1MSP.member')
      Writers:
        Type: Signature
        Rule: OR('Org1MSP.member')
      Endorsement:
        Type: Signature
        Rule: OR('Org1MSP.member')
      Admins:
        Type: Signature
        Rule: OR('Org1MSP.admin')
    AnchorPeers:

  - &Org2MSP
    Name: Org2
    ID: Org2MSP
    MSPDir: ./crypto/peerOrganizations/org2.example.com/msp
    Policies:
      Readers:
        Type: Signature
        Rule: OR('Org2MSP.member')
      Writers:
        Type: Signature
        Rule: OR('Org2MSP.member')
      Endorsement:
        Type: Signature
        Rule: OR('Org2MSP.member')
      Admins:
        Type: Signature
        Rule: OR('Org2MSP.admin')
    AnchorPeers:


Capabilities:
  Channel: &ChannelCapabilities
    V3_0: true
  Orderer: &OrdererCapabilities
    V2_0: true
  Application: &ApplicationCapabilities
    V2_5: true

Application: &ApplicationDefaults
  ACLs:
    _lifecycle/CheckCommitReadiness: /Channel/Application/Writers
    _lifecycle/CommitChaincodeDefinition: /Channel/Application/Writers
    _lifecycle/QueryChaincodeDefinition: /Channel/Application/Writers
    _lifecycle/QueryChaincodeDefinitions: /Channel/Application/Writers
    lscc/ChaincodeExists: /Channel/Application/Readers
    lscc/GetDeploymentSpec: /Channel/Application/Readers
    lscc/GetChaincodeData: /Channel/Application/Readers
    lscc/GetInstantiatedChaincodes: /Channel/Application/Readers
    qscc/GetChainInfo: /Channel/Application/Readers
    qscc/GetBlockByNumber: /Channel/Application/Readers
    qscc/GetBlockByHash: /Channel/Application/Readers
    qscc/GetTransactionByID: /Channel/Application/Readers
    qscc/GetBlockByTxID: /Channel/Application/Readers
    cscc/GetConfigBlock: /Channel/Application/Readers
    cscc/GetChannelConfig: /Channel/Application/Readers
    peer/Propose: /Channel/Application/Writers
    peer/ChaincodeToChaincode: /Channel/Application/Writers
    event/Block: /Channel/Application/Readers
    event/FilteredBlock: /Channel/Application/Readers
  Organizations:
    - *Org1MSP
    - *Org2MSP
  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: ANY Readers
    Writers:
      Type: ImplicitMeta
      Rule: ANY Writers
    Admins:
      Type: ImplicitMeta
      Rule: ANY Admins
    Endorsement:
      Type: ImplicitMeta
      Rule: ANY Endorsement
    LifecycleEndorsement:
      Type: Signature
      Rule: OR('Org1MSP.member','Org2MSP.member')
  Capabilities:
    <<: *ApplicationCapabilities

Orderer: &OrdererDefaults
  OrdererType: arma
  BatchTimeout: 500ms
  BatchSize:
    MaxMessageCount: 3500
    AbsoluteMaxBytes: 16 MB
    PreferredMaxBytes: 4 MB
  MaxChannels: 0
  ConsenterMapping:
    - ID: 1
      Host: orderer-party1-consenter
      Port: 7052
      MSPID: OrdererOrg1MSP
      Identity: ./crypto/ordererOrganizations/orderer-org-1/orderers/party1/consenter.orderer-org-1/msp/signcerts/consenter.orderer-org-1-cert.pem
      ClientTLSCert: ./crypto/ordererOrganizations/orderer-org-1/orderers/party1/consenter.orderer-org-1/tls/server.crt
      ServerTLSCert: ./crypto/ordererOrganizations/orderer-org-1/orderers/party1/consenter.orderer-org-1/tls/server.crt
    - ID: 2
      Host: orderer-party2-consenter
      Port: 7152
      MSPID: OrdererOrg2MSP
      Identity: ./crypto/ordererOrganizations/orderer-org-2/orderers/party2/consenter.orderer-org-2/msp/signcerts/consenter.orderer-org-2-cert.pem
      ClientTLSCert: ./crypto/ordererOrganizations/orderer-org-2/orderers/party2/consenter.orderer-org-2/tls/server.crt
      ServerTLSCert: ./crypto/ordererOrganizations/orderer-org-2/orderers/party2/consenter.orderer-org-2/tls/server.crt
    - ID: 3
      Host: orderer-party3-consenter
      Port: 7252
      MSPID: OrdererOrg3MSP
      Identity: ./crypto/ordererOrganizations/orderer-org-3/orderers/party3/consenter.orderer-org-3/msp/signcerts/consenter.orderer-org-3-cert.pem
      ClientTLSCert: ./crypto/ordererOrganizations/orderer-org-3/orderers/party3/consenter.orderer-org-3/tls/server.crt
      ServerTLSCert: ./crypto/ordererOrganizations/orderer-org-3/orderers/party3/consenter.orderer-org-3/tls/server.crt
    - ID: 4
      Host: orderer-party4-consenter
      Port: 7352
      MSPID: OrdererOrg4MSP
      Identity: ./crypto/ordererOrganizations/orderer-org-4/orderers/party4/consenter.orderer-org-4/msp/signcerts/consenter.orderer-org-4-cert.pem
      ClientTLSCert: ./crypto/ordererOrganizations/orderer-org-4/orderers/party4/consenter.orderer-org-4/tls/server.crt
      ServerTLSCert: ./crypto/ordererOrganizations/orderer-org-4/orderers/party4/consenter.orderer-org-4/tls/server.crt
  Organizations:
    - *OrdererOrg1MSP
    - *OrdererOrg2MSP
    - *OrdererOrg3MSP
    - *OrdererOrg4MSP
  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: ANY Readers
    Writers:
      Type: ImplicitMeta
      Rule: ANY Writers
    Admins:
      Type: ImplicitMeta
      Rule: MAJORITY Admins
    BlockValidation:
      Type: ImplicitMeta
      Rule: ANY Writers
  Capabilities:
    <<: *OrdererCapabilities

Channel: &ChannelDefaults
  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: ANY Readers
    Writers:
      Type: ImplicitMeta
      Rule: ANY Writers
    Admins:
      Type: ImplicitMeta
      Rule: MAJORITY Admins
  Capabilities:
    <<: *ChannelCapabilities

Profiles:
  OrgsChannel:
    <<: *ChannelDefaults
    Orderer:
      <<: *OrdererDefaults
      Arma:
        Path: /config/crypto/shared_config.binpb
    Consortium: SampleConsortium
    Application:
      <<: *ApplicationDefaults
